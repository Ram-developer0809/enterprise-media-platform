<div class="settings-container">

<h2>Settings</h2>

<h3>Profile Update</h3>

<input type="text" [(ngModel)]="profile.name" placeholder="Name">

<input type="email" [(ngModel)]="profile.email" placeholder="Email">

<input type="text" [(ngModel)]="profile.mobile" placeholder="Mobile">

<button (click)="updateProfile()">Update Profile</button>

<hr>

<h3>Change Password</h3>

<input type="password" [(ngModel)]="password.current" placeholder="Current Password">

<input type="password" [(ngModel)]="password.new" placeholder="New Password">

<input type="password" [(ngModel)]="password.confirm" placeholder="Confirm Password">

<button (click)="changePassword()">Change Password</button>

<hr>

<h3>Theme</h3>

<label>
<input type="checkbox" [(ngModel)]="darkMode" (change)="toggleTheme()">
Dark Mode
</label>

</div>
