<div class="login-container">
  <div class="login-box">
    <h1>Enterprise Media Platform</h1>
    <h2>Login</h2>

    <input
      type="email"
      placeholder="Enter Email"
      [(ngModel)]="email"
    />

    <input
      type="password"
      placeholder="Enter Password"
      [(ngModel)]="password"
    />

    <button (click)="login()">Login</button>

    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
</div>
